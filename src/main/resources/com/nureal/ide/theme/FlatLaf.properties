# Tema Nureal (aplica-se aos temas claro e escuro do FlatLaf)
# Visual moderno: acento esmeralda, cantos padronizados (~6-8px) e realces suaves.
# Tons de cinza suaves (sem branco puro) para cansar menos a vista.

@accentColor = #059669

# Cantos arredondados padronizados (estilo Tailwind/shadcn ~6-8px)
Component.arc = 8
Button.arc = 8
TextComponent.arc = 8
ProgressBar.arc = 8
Popup.borderCornerRadius = 8

# Foco discreto com o esmeralda da marca
Component.focusWidth = 1
Component.innerFocusWidth = 1
Component.focusColor = #05966966

# Barras de rolagem finas e arredondadas
ScrollBar.width = 11
ScrollBar.thumbArc = 999
ScrollBar.trackArc = 999
ScrollBar.showButtons = false

# Divisorias finas entre os paineis (menos "grossas")
SplitPane.dividerSize = 4

# Abas estilo "card" mais limpas (mesmo estilo no editor e nos resultados)
TabbedPane.tabType = card
TabbedPane.showTabSeparators = false
TabbedPane.tabArc = 8
TabbedPane.tabInsets = 6,14,6,14

# Janela com fundo unificado
TitlePane.unifiedBackground = true

# ---------------- Tema claro: cinzas suaves ----------------
# "Moldura" (janela, paineis, abas, rolagem) num cinza um pouco mais fechado
[light]@background = #E9EBEF
[light]Panel.background = #E9EBEF
[light]TabbedPane.background = #E9EBEF
[light]ScrollPane.background = #E9EBEF
[light]MenuBar.background = #E9EBEF
[light]ToolBar.background = #E9EBEF
[light]SplitPane.background = #E9EBEF

# Superficies de conteudo num cinza bem claro (nao branco puro)
[light]TextField.background = #F6F7F9
[light]FormattedTextField.background = #F6F7F9
[light]PasswordField.background = #F6F7F9
[light]ComboBox.background = #F6F7F9
[light]Spinner.background = #F6F7F9
[light]List.background = #F4F5F8
[light]Tree.background = #F4F5F8
[light]Table.background = #F6F7F9
[light]TextArea.background = #F6F7F9
[light]TextPane.background = #F6F7F9
[light]EditorPane.background = #F6F7F9
[light]Viewport.background = #F6F7F9

[light]TextComponent.selectionBackground = #05966933
[light]List.selectionBackground = #059669
[light]Tree.selectionBackground = #059669
[light]Table.selectionBackground = #059669

# ---------------- Tema escuro ----------------
[dark]TextComponent.selectionBackground = #05966955
[dark]List.selectionBackground = #059669
[dark]Tree.selectionBackground = #059669
[dark]Table.selectionBackground = #059669
